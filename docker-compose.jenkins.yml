version: '3.8'

services:

  mongodb-ci:
    image: mongo:6.0
    container_name: mongodb-ci
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_ci_data:/data/db

  backend-ci:
    image: node:18
    container_name: backend-ci
    restart: always
    ports:
      - "2001:2000"
    environment:
      - MONGO_URL=mongodb://mongodb-ci:27017/productDB
    depends_on:
      - mongodb-ci
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install && node server.js"

  frontend-ci:
    image: node:18
    container_name: frontend-ci
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend-ci
    volumes:
      - ./frontend:/app
    working_dir: /app
    environment:
      - CI=false
      - NODE_OPTIONS=--openssl-legacy-provider
    command: sh -c "npm install --legacy-peer-deps && npm run build && npx serve -s build -l 3000"

volumes:
  mongo_ci_data:
    driver: local
